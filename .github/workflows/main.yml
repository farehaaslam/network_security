name: workflow
on:
    push:
        branches: 
            - main
        paths-ignore:
            - 'README.md'
jobs:
    integration:
        name: continous integration
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v2
    
    build_and_push_ecr_image:
        name: continous delivery
        needs: integration
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: install utilities
              run: |
                sudo apt-get update
                sudo apt-get install -y jq unzip
            - name: configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
                aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
                aws-region: ${{secrets.AWS_REGION}}
            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2
            - name: Build, tag, and push image to Amazon ECR
              env:
                    ECR_REGISTRY: ${{steps.login-ecr.outputs.registry}}
                    ECR_REPOSITORY: ${{secrets.ECR_REPOSITORY_NAME}}
                    IMAGE_TAG: latest
              run: |
                    docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
                    docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG  

    continuous_deployment:
        name: deploy to ec2
        needs: build_and_push_ecr_image
        runs-on: self-hosted
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Clean old images and containers
              run: docker system prune -f

            - name: Stop and remove existing container
              run: |
                  docker stop networksecurity || true
                  docker rm networksecurity || true

            - name: Pull latest image from ECR
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
                  IMAGE_TAG: latest
              run: docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

            - name: Run new container
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
                  IMAGE_TAG: latest
              run: |
                  docker run -d \
                    -p 8080:8000 \
                    --ipc="host" \
                    --name networksecurity \
                    --restart always \
                    -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
                    -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
                    -e AWS_REGION=${{ secrets.AWS_REGION }} \
                    $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG